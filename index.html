<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Backrooms Fixed View</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #instructions {
            position: absolute;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; cursor: pointer;
            font-family: sans-serif; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <span style="font-size:36px">Click to Play</span>
        <br /><br />
        Move: WASD | Look: MOUSE
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // --- 設定 ---
        const mapSize = 50;     
        const cellSize = 6;     // 1マスのサイズ
        const wallHeight = 3.5; 
        const playerSpeed = 6.0;
        const wallProbability = 0.12; 

        // --- 1. 基本セットアップ ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x998855, 0.1);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 2. 操作系 ---
        const controls = new THREE.PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');
        instructions.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => instructions.style.display = 'none');
        controls.addEventListener('unlock', () => instructions.style.display = 'flex');
        scene.add(controls.getObject());

        // プレイヤーの初期位置設定（地面 y=0 から 1.7m の高さに目を置く）
        controls.getObject().position.set(mapSize/2 * cellSize, 1.7, mapSize/2 * cellSize);

        // --- 3. マテリアル生成 ---
        function createBackroomsTexture(color, noiseOp) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color;
            ctx.fillRect(0, 0, 256, 256);
            const imageData = ctx.getImageData(0, 0, 256, 256);
            const data = imageData.data;
            for(let i=0; i<data.length; i+=4) {
                const noise = Math.random() * noiseOp;
                data[i] -= noise; data[i+1] -= noise; data[i+2] -= noise;
            }
            ctx.putImageData(imageData, 0, 0);
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        const wallTex = createBackroomsTexture('#d9ca77', 25);
        const wallMaterial = new THREE.MeshLambertMaterial({ map: wallTex });
        const floorTex = createBackroomsTexture('#7d6b41', 35);
        floorTex.repeat.set(100, 100);
        const floorMaterial = new THREE.MeshLambertMaterial({ map: floorTex });
        const ceilingTex = createBackroomsTexture('#ffffff', 10);
        ceilingTex.repeat.set(100, 100);
        const ceilingMaterial = new THREE.MeshLambertMaterial({ map: ceilingTex });

        // --- 4. 構築 ---
        const walls = [];
        const wallGeometry = new THREE.BoxGeometry(cellSize, wallHeight, cellSize);
        const totalWorldSize = mapSize * cellSize;

        // 床 (y=0)
        const floorGeo = new THREE.PlaneGeometry(totalWorldSize, totalWorldSize);
        const floor = new THREE.Mesh(floorGeo, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(totalWorldSize/2, 0, totalWorldSize/2);
        scene.add(floor);

        // 天井 (y=wallHeight)
        const ceiling = new THREE.Mesh(floorGeo, ceilingMaterial);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.set(totalWorldSize/2, wallHeight, totalWorldSize/2);
        scene.add(ceiling);

        // 壁と照明のランダム配置
        for (let y = 0; y < mapSize; y++) {
            for (let x = 0; x < mapSize; x++) {
                const isEdge = (x === 0 || x === mapSize - 1 || y === 0 || y === mapSize - 1);
                const isStartArea = (Math.abs(x - mapSize/2) < 3 && Math.abs(y - mapSize/2) < 3);

                if (isEdge || (Math.random() < wallProbability && !isStartArea)) {
                    const wall = new THREE.Mesh(wallGeometry, wallMaterial);
                    // 壁の底を地面(y=0)に合わせるため、中心を wallHeight/2 に設定
                    wall.position.set(x * cellSize, wallHeight / 2, y * cellSize);
                    scene.add(wall);
                    walls.push(wall);
                } else {
                    if (Math.random() < 0.05) {
                        const light = new THREE.PointLight(0xffffcc, 0.6, cellSize * 5);
                        light.position.set(x * cellSize, wallHeight - 0.2, y * cellSize);
                        scene.add(light);
                        
                        const lamp = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.05, 0.5), new THREE.MeshBasicMaterial({color: 0xffffcc}));
                        lamp.position.copy(light.position);
                        scene.add(lamp);
                    }
                }
            }
        }

        scene.add(new THREE.AmbientLight(0x444444));

        // --- 5. アニメーションと衝突判定 ---
        const keys = { W: false, A: false, S: false, D: false };
        document.addEventListener('keydown', (e) => keys[e.key.toUpperCase()] = true);
        document.addEventListener('keyup', (e) => keys[e.key.toUpperCase()] = false);

        const raycaster = new THREE.Raycaster();
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const delta = clock.getDelta();
                const moveDist = playerSpeed * delta;
                
                const playerPos = controls.getObject().position;
                const direction = new THREE.Vector3();
                const front = new THREE.Vector3();
                const side = new THREE.Vector3();

                camera.getWorldDirection(front);
                front.y = 0; front.normalize();
                side.crossVectors(front, camera.up).normalize();

                if (keys.W) direction.add(front);
                if (keys.S) direction.sub(front);
                if (keys.A) direction.sub(side);
                if (keys.D) direction.add(side);

                if (direction.length() > 0) {
                    direction.normalize();
                    
                    // 衝突判定：プレイヤーの現在位置から移動方向にレイを飛ばす
                    raycaster.set(playerPos, direction);
                    const intersections = raycaster.intersectObjects(walls);
                    
                    // 壁との距離が一定以下なら移動を制限
                    let canMove = true;
                    if (intersections.length > 0 && intersections[0].distance < 1.0) {
                        canMove = false;
                    }

                    if (canMove) {
                        controls.moveRight(direction.dot(side) * moveDist);
                        controls.moveForward(direction.dot(front) * moveDist);
                    }
                }
                
                // y座標（高さ）がズレないように強制固定（埋まり防止）
                playerPos.y = 1.7;
            }
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
