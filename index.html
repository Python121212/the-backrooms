<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Backrooms</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. 基本的なセットアップ
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xaaaaaa, 0.05); // 霧を追加して奥を暗く

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6; // 目の高さ

        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. テクスチャのロード（ここでは色のみ使用）
        const wallMaterial = new THREE.MeshLambertMaterial({ color: 0xe0e080 }); // 黄ばんだ壁
        const floorMaterial = new THREE.MeshLambertMaterial({ color: 0x806040 }); // 茶色いカーペット
        const ceilingMaterial = new THREE.MeshLambertMaterial({ color: 0xffffff }); // 白い天井

        // 3. 部屋の構成要素を作成する関数
        const roomSize = 10;
        const wallHeight = 3;

        function createRoom(x, z) {
            const group = new THREE.Group();

            // 床
            const floorGeometry = new THREE.PlaneGeometry(roomSize, roomSize);
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = 0;
            group.add(floor);

            // 天井
            const ceilingGeometry = new THREE.PlaneGeometry(roomSize, roomSize);
            const ceiling = new THREE.Mesh(ceilingGeometry, ceilingMaterial);
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.y = wallHeight;
            group.add(ceiling);

            // 壁（4面）
            const wallGeometry = new THREE.PlaneGeometry(roomSize, wallHeight);
            
            const wall1 = new THREE.Mesh(wallGeometry, wallMaterial);
            wall1.position.z = -roomSize / 2;
            wall1.position.y = wallHeight / 2;
            group.add(wall1);

            const wall2 = new THREE.Mesh(wallGeometry, wallMaterial);
            wall2.position.z = roomSize / 2;
            wall2.position.y = wallHeight / 2;
            wall2.rotation.y = Math.PI;
            group.add(wall2);

            const wall3 = new THREE.Mesh(wallGeometry, wallMaterial);
            wall3.position.x = -roomSize / 2;
            wall3.position.y = wallHeight / 2;
            wall3.rotation.y = Math.PI / 2;
            group.add(wall3);

            const wall4 = new THREE.Mesh(wallGeometry, wallMaterial);
            wall4.position.x = roomSize / 2;
            wall4.position.y = wallHeight / 2;
            wall4.rotation.y = -Math.PI / 2;
            group.add(wall4);

            // 蛍光灯（光源とオブジェクト）
            const light = new THREE.PointLight(0xffffcc, 1, 15);
            light.position.set(0, wallHeight - 0.2, 0);
            group.add(light);

            const lampGeometry = new THREE.BoxGeometry(2, 0.1, 0.5);
            const lampMaterial = new THREE.MeshBasicMaterial({ color: 0xffffcc });
            const lamp = new THREE.Mesh(lampGeometry, lampMaterial);
            lamp.position.set(0, wallHeight - 0.1, 0);
            group.add(lamp);

            group.position.set(x * roomSize, 0, z * roomSize);
            scene.add(group);
        }

        // 4. 部屋をグリッド状に配置
        const gridSize = 10; // 10x10の部屋
        for (let i = -gridSize / 2; i < gridSize / 2; i++) {
            for (let j = -gridSize / 2; j < gridSize / 2; j++) {
                createRoom(i, j);
            }
        }

        // 5. カメラの移動（簡易版）
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        const moveSpeed = 0.1;
        const rotateSpeed = 0.02;

        function animate() {
            requestAnimationFrame(animate);

            // 移動
            if (keys['KeyW']) camera.translateZ(-moveSpeed);
            if (keys['KeyS']) camera.translateZ(moveSpeed);
            if (keys['KeyA']) camera.translateX(-moveSpeed);
            if (keys['KeyD']) camera.translateX(moveSpeed);

            // 回転（マウス移動で実装するのが一般的ですが、ここではキーボードで簡易実装）
            if (keys['ArrowLeft']) camera.rotation.y += rotateSpeed;
            if (keys['ArrowRight']) camera.rotation.y -= rotateSpeed;

            renderer.render(scene, camera);
        }

        animate();

        // ウィンドウサイズ変更への対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
