<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Level 0 - The Backrooms</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: #ffff00; font-family: monospace; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">LEVEL 0 | NO-CLIP DETECTED</div>
    
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- シーン設定 ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x8a8a3a, 1, 25); // 遠くを霞ませて無限感を出す
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // 軽量化のためアンチエイリアスOFF
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x8a8a3a);
        document.body.appendChild(renderer.domElement);

        // --- 軽量テクスチャ作成 (キャンバスで動的に作成) ---
        const createWallTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#dbdb8a'; // 黄ばんだ壁の色
            ctx.fillRect(0, 0, 128, 128);
            ctx.strokeStyle = '#c0c070';
            for(let i=0; i<20; i++) ctx.strokeRect(Math.random()*128, Math.random()*128, 10, 50); // 汚れ
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        };
        const wallMaterial = new THREE.MeshBasicMaterial({ map: createWallTexture() });

        // --- 空間の構築 (床と天井) ---
        const planeGeo = new THREE.PlaneGeometry(1000, 1000);
        
        const floor = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({ color: 0x707030 })); // 湿ったカーペット色
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const ceiling = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({ color: 0xaaaa77 })); // 天井タイル
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = 3;
        scene.add(ceiling);

        // --- 壁と蛍光灯の簡易的なグリッド生成 ---
        const wallGeo = new THREE.BoxGeometry(1, 3, 1);
        const lightGeo = new THREE.BoxGeometry(0.8, 0.1, 0.2);
        const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffee });

        for (let x = -50; x < 50; x += 5) {
            for (let z = -50; z < 50; z += 5) {
                if (Math.random() > 0.7) { // ランダムに壁を配置
                    const wall = new THREE.Mesh(wallGeo, wallMaterial);
                    wall.position.set(x, 1.5, z);
                    scene.add(wall);
                }
                // 天井に蛍光灯を配置
                const light = new THREE.Mesh(lightGeo, lightMat);
                light.position.set(x, 2.95, z);
                scene.add(light);
            }
        }

        // --- 簡易移動コントロール ---
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
        });

        camera.position.set(0, 1.6, 0);

        function animate() {
            requestAnimationFrame(animate);
            // 簡易移動
            if (moveForward) camera.translateZ(-0.05);
            if (moveBackward) camera.translateZ(0.05);
            
            // プレイヤーに合わせて床と天井を動かす（簡易的な無限ループ）
            floor.position.x = camera.position.x;
            floor.position.z = camera.position.z;
            ceiling.position.x = camera.position.x;
            ceiling.position.z = camera.position.z;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
